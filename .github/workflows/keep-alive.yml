name: Keep Backend Alive

# ⚠️ WARNING: This workflow is NOT reliable for keeping Render backends alive!
#
# GitHub Actions scheduled workflows have delays of 3-10+ minutes during high load.
# Render spins down after exactly 15 minutes, so we need guaranteed consistent timing.
#
# RECOMMENDED SOLUTION: Use external monitoring service instead
# - UptimeRobot (https://uptimerobot.com) - Free, 5-min intervals, 99.9%+ reliability
# - cron-job.org (https://cron-job.org) - Free, 14-min intervals, unlimited jobs
#
# Setup guide: See KEEP_ALIVE_SETUP_GUIDE.md for step-by-step instructions
#
# This workflow is kept for:
# 1. Backup/fallback (may help during rare UptimeRobot outages)
# 2. Manual triggering via workflow_dispatch
# 3. Reference implementation
#
# For production use, set up UptimeRobot or cron-job.org!

on:
  schedule:
    # Run every 14 minutes to prevent Render free tier spin-down
    # Render spins down after 15 minutes of inactivity
    # NOTE: This timing is NOT guaranteed by GitHub Actions!
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Backend Health Check
        run: |
          echo "Pinging backend to prevent Render spin-down..."
          echo "Target: https://mnm-home.onrender.com/"
          echo "Time: $(date -u)"

          # Ping the backend root endpoint
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://mnm-home.onrender.com/)

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Backend is alive! (HTTP $RESPONSE)"
          else
            echo "⚠️  Unexpected response: HTTP $RESPONSE"
            exit 1
          fi

      - name: Log Success
        if: success()
        run: echo "Keep-alive ping completed successfully at $(date -u)"

      - name: Log Failure
        if: failure()
        run: echo "❌ Keep-alive ping failed at $(date -u)"
